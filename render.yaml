# Render Blueprint for the backend API.
# Deploy: push this repo to GitHub, then Render → New → Blueprint → pick the repo.
# The service root is the repository root (this file + Dockerfile live there).
services:
  - type: web
    name: idea-validator-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # A persistent disk needs a paid instance (Starter $7/mo). On the free plan,
    # drop the `disk:` block and set DATABASE_PATH=/tmp/app.db — history is then
    # lost on each restart/spin-down, which is fine for a demo.
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: LLM_PROVIDER
        value: azure
      - key: DATABASE_PATH
        value: /data/app.db
      # Set this to your Vercel frontend URL, e.g. https://your-app.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Secrets — fill these in the Render dashboard (sync:false = not in git).
      - key: AZURE_FOUNDRY_ENDPOINT
        sync: false
      - key: AZURE_FOUNDRY_API_KEY
        sync: false
      - key: AZURE_FOUNDRY_DEPLOYMENT
        sync: false
      - key: TAVILY_API_KEY
        sync: false
